name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax-check server
        run: |
          for f in server/*.js; do
            echo "checking $f"
            node --check "$f"
          done

      - name: Build all three modes
        run: |
          npm run build:web
          npm run build:app
          npm run build:onefile

      - name: Smoke-test server (demo mode)
        run: |
          PORT=8787 node server/index.js &
          SRV=$!
          for i in $(seq 1 20); do
            if curl -fsS http://localhost:8787/api/health > /dev/null; then
              echo "health OK"; break
            fi
            sleep 0.5
          done
          curl -fsS http://localhost:8787/api/health
          kill $SRV 2>/dev/null || true
